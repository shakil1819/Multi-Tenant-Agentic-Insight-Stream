services:
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.28.4
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --scheme
      - http
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: "25"
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      CLUSTER_HOSTNAME: "node1"
      DEFAULT_VECTORIZER_MODULE: "none"
    volumes:
      - weaviate_data:/var/lib/weaviate
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=3 --spider http://localhost:8080/v1/.well-known/ready || exit 1",
        ]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  backend:
    image: node:20-alpine
    working_dir: /workspace
    init: true
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      WEAVIATE_URL: "http://weaviate:8080"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./:/workspace
      - backend_node_modules:/workspace/node_modules
    command: >
      sh -c "npm install &&
             npm run setup &&
             npm run dev"
    depends_on:
      weaviate:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    working_dir: /app
    init: true
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_PROXY_TARGET: "http://backend:3000"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: >
      sh -c "npm install &&
             npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:5173 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

volumes:
  weaviate_data:
  backend_node_modules:
  frontend_node_modules:
