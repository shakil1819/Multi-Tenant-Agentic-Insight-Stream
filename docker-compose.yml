version: "3.9"

services:
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.28.4
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --scheme
      - http
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: "25"
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      CLUSTER_HOSTNAME: "node1"
      DEFAULT_VECTORIZER_MODULE: "none"
    volumes:
      - weaviate_data:/var/lib/weaviate
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=3 --spider http://localhost:8080/v1/.well-known/ready || exit 1",
        ]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentic-node-app
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      WEAVIATE_URL: "http://weaviate:8080"
    depends_on:
      weaviate:
        condition: service_healthy

volumes:
  weaviate_data:
